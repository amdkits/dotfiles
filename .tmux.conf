set-option -g prefix C-SPACE

bind-key r source-file ~/.tmux.conf \; display-message ".tmux.conf reloaded."

# mouse mode
set -g mouse on

bind -n S-Left previous-window
bind -n S-Right next-window

bind-key v split-window -h
bind-key b split-window -v

# use alt-arrow keys without prefix key to switch panes
bind -n M-h select-pane -L
bind -n M-l select-pane -R 
bind -n M-k select-pane -U
bind -n M-j select-pane -D

bind-key -n C-M-h swap-window -t -1
bind-key -n C-M-l swap-window -t +1

unbind -T root h
unbind -T root j
unbind -T root k
unbind -T root l

bind-key y set-window-option synchronize-panes\; display-message "synchronize mode toggled."

setw -g mode-keys vi
unbind p
bind p paste-buffer
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

set-option -g display-time 3000
set-option -g display-panes-time 3000

set-option -g repeat-time 0

setw -g monitor-activity on

setw -g monitor-silence 0

setw -g monitor-bell off

set -g visual-activity off

set -g status on
set -g status-bg black
set -g status-fg white
set -g status-justify absolute-centre
set -g status-interval 1

set -g status-position top

set-window-option -g window-status-current-format "#[fg=colour159,bold]#I:#W*"
set -g window-status-format "#I:#W"

set -g status-left "#[fg=colour153,bold]#S"
#let -g status-right "#[fg=colour153]#(cat /sys/class/power_supply/BAT0/capacity)% | #(uptime | awk -F'load average: ' '{print $2}' | cut -d',' -f1) | %H:%M"
set -g status-right "#[fg=colour153]#(cat /sys/class/power_supply/BAT0/capacity)#[fg=colour153]#(cat /sys/class/power_supply/BAT0/status | grep -q Charging && echo '#' || echo '')% | #(uptime | awk -F'load average: ' '{print $2}' | cut -d',' -f1) | %H:%M"

set -g base-index 1
set -g renumber-windows on

set -g pane-border-style fg=black
set -g pane-active-border-style fg=black

bind-key L clear-history

set -sg escape-time 10

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-navigator'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @plugin 'fabioluciano/tmux-tokyo-night'

